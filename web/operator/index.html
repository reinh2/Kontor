<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kontor · Operator</title>
  <link rel="stylesheet" href="/operator/ds/styles.css">
  <script src="/operator/vendor/react.js"></script>
  <script src="/operator/vendor/react-dom.js"></script>
  <script src="/operator/ds/bundle.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans); font-size: var(--fs-body); line-height: var(--lh-normal); }
    .app-shell { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 236px; min-width: 236px; background: var(--surface-1); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; padding: var(--space-4) 0; overflow-y: auto; }
    .sidebar-brand { display: flex; align-items: center; gap: var(--space-3); padding: 0 var(--space-4); margin-bottom: var(--space-6); }
    .sidebar-monogram { width: 28px; height: 28px; border-radius: var(--radius-md); background: var(--accent); display: flex; align-items: center; justify-content: center; color: var(--text-on-accent); font-weight: var(--fw-bold); font-size: var(--fs-body-sm); }
    .sidebar-title { font-weight: var(--fw-semibold); font-size: var(--fs-body-lg); color: var(--text-primary); }
    .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: var(--space-0-5); padding: 0 var(--space-2); }
    .nav-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-2) var(--space-3); border-radius: var(--radius-md); color: var(--text-secondary); font-size: var(--fs-body); font-weight: var(--fw-medium); cursor: pointer; text-decoration: none; border: none; background: none; width: 100%; text-align: left; transition: var(--transition-colors); }
    .nav-item:hover { background: var(--surface-hover); color: var(--text-primary); }
    .nav-item:focus-visible { outline: 2px solid var(--border-focus); outline-offset: -2px; }
    .nav-item.active { background: var(--accent-subtle); color: var(--text-accent); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-bottom { padding: var(--space-3) var(--space-4); border-top: 1px solid var(--border-subtle); margin-top: auto; display: flex; align-items: center; gap: var(--space-3); }
    .avatar { width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--fs-caption); font-weight: var(--fw-semibold); flex-shrink: 0; }
    .avatar-accent { background: var(--accent-subtle); color: var(--text-accent); }
    .sidebar-user-name { font-size: var(--fs-body-sm); font-weight: var(--fw-medium); color: var(--text-primary); }
    .sidebar-user-sub { font-size: var(--fs-caption); color: var(--text-tertiary); }
    .topbar { height: 56px; background: var(--surface-1); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--space-5); flex-shrink: 0; }
    .topbar-left { display: flex; align-items: center; gap: var(--space-3); }
    .topbar-title { font-size: var(--fs-body-lg); font-weight: var(--fw-semibold); color: var(--text-primary); }
    .topbar-sub { font-size: var(--fs-body-sm); color: var(--text-tertiary); }
    .topbar-right { display: flex; align-items: center; gap: var(--space-3); }
    .range-tabs { display: flex; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-default); }
    .range-tab { padding: var(--space-1-5) var(--space-3); font-size: var(--fs-caption); font-weight: var(--fw-medium); color: var(--text-secondary); background: var(--surface-1); border: none; cursor: pointer; transition: var(--transition-colors); }
    .range-tab:hover { color: var(--text-primary); background: var(--surface-hover); }
    .range-tab.active { background: var(--accent-subtle); color: var(--text-accent); }
    .range-tab:focus-visible { outline: 2px solid var(--border-focus); outline-offset: -2px; }
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; padding: var(--space-5); }
    /* KPI Grid */
    .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: var(--space-4); margin-bottom: var(--space-5); }
    .kpi-card { background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-2); }
    .kpi-label { font-size: var(--fs-micro); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--text-tertiary); }
    .kpi-value { font-family: var(--font-mono); font-size: var(--fs-h2); font-weight: var(--fw-semibold); color: var(--text-primary); }
    .kpi-sparkline { height: 34px; width: 100%; }
    .kpi-delta { font-size: var(--fs-caption); font-weight: var(--fw-medium); }
    .kpi-delta.positive { color: var(--status-success-fg); }
    .kpi-delta.negative { color: var(--status-error-fg); }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-4); margin-bottom: var(--space-5); }
    .chart-card { background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-5); }
    .chart-title { font-size: var(--fs-body-lg); font-weight: var(--fw-semibold); color: var(--text-primary); margin-bottom: var(--space-1); }
    .chart-subtitle { font-size: var(--fs-body-sm); color: var(--text-tertiary); margin-bottom: var(--space-4); }
    .chart-legend { display: flex; gap: var(--space-4); margin-top: var(--space-3); }
    .legend-item { display: flex; align-items: center; gap: var(--space-2); font-size: var(--fs-caption); color: var(--text-secondary); }
    .legend-dot { width: 8px; height: 8px; border-radius: var(--radius-full); }

    /* Data Table */
    .data-table-wrap { background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; font-size: var(--fs-body-sm); }
    .data-table th { text-align: left; padding: var(--space-3) var(--space-4); font-size: var(--fs-micro); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--text-tertiary); border-bottom: 1px solid var(--border-default); background: var(--surface-2); white-space: nowrap; }
    .data-table td { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); }
    .data-table tbody tr { transition: var(--transition-colors); }
    .data-table tbody tr:hover td { background: var(--surface-hover); }
    .data-table .mono { font-family: var(--font-mono); font-size: var(--fs-body-sm); color: var(--text-primary); }
    .data-table .accent { color: var(--text-accent); }
    /* Badge */
    .badge { display: inline-flex; align-items: center; padding: var(--space-0-5) var(--space-2); border-radius: var(--radius-full); font-size: var(--fs-micro); font-weight: var(--fw-medium); white-space: nowrap; }
    .badge-success { background: var(--status-success-bg); color: var(--status-success-fg); border: 1px solid var(--status-success-border); }
    .badge-warning { background: var(--status-warning-bg); color: var(--status-warning-fg); border: 1px solid var(--status-warning-border); }
    .badge-error { background: var(--status-error-bg); color: var(--status-error-fg); border: 1px solid var(--status-error-border); }
    .badge-neutral { background: var(--status-neutral-bg); color: var(--status-neutral-fg); border: 1px solid var(--status-neutral-border); }

    /* Attention panel */
    .attention-panel { background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-4); margin-top: var(--space-5); }
    .attention-title { font-size: var(--fs-body); font-weight: var(--fw-semibold); color: var(--text-primary); margin-bottom: var(--space-3); }
    .attention-item { display: flex; align-items: flex-start; gap: var(--space-3); padding: var(--space-3) 0; border-bottom: 1px solid var(--border-subtle); }
    .attention-item:last-child { border-bottom: none; }
    .attention-dot { width: 8px; height: 8px; border-radius: var(--radius-full); flex-shrink: 0; margin-top: 6px; }
    .attention-dot.warning { background: var(--status-warning-fg); }
    .attention-dot.error { background: var(--status-error-fg); }
    .attention-body { flex: 1; }
    .attention-item-title { font-size: var(--fs-body-sm); font-weight: var(--fw-medium); color: var(--text-primary); }
    .attention-ref { font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--text-tertiary); }
    .attention-action { font-size: var(--fs-body-sm); font-weight: var(--fw-medium); color: var(--text-accent); background: none; border: none; cursor: pointer; padding: 0; }
    .attention-action:hover { text-decoration: underline; }
    .attention-action:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 2px; }

    /* Trace layout */
    .trace-layout { display: grid; grid-template-columns: 45% 55%; gap: var(--space-5); }
    .trace-summary { display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; margin-bottom: var(--space-4); padding: var(--space-4); background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); }
    .trace-summary-item { display: flex; flex-direction: column; gap: var(--space-1); }
    .trace-summary-label { font-size: var(--fs-micro); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--text-tertiary); }
    .trace-summary-value { font-family: var(--font-mono); font-size: var(--fs-body-sm); color: var(--text-primary); }
    /* Key-Value */
    .kv-block { background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-4); margin-bottom: var(--space-4); }
    .kv-row { display: flex; justify-content: space-between; padding: var(--space-2) 0; border-bottom: 1px solid var(--border-subtle); }
    .kv-row:last-child { border-bottom: none; }
    .kv-label { font-size: var(--fs-body-sm); color: var(--text-tertiary); }
    .kv-value { font-size: var(--fs-body-sm); color: var(--text-primary); }
    .kv-value.mono { font-family: var(--font-mono); }

    /* Conversation pane */
    .conversation { display: flex; flex-direction: column; gap: var(--space-4); padding: var(--space-4); background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); overflow-y: auto; max-height: calc(100vh - 200px); }
    .msg { display: flex; gap: var(--space-3); align-items: flex-start; }
    .msg-avatar { width: 32px; height: 32px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--fs-caption); font-weight: var(--fw-semibold); flex-shrink: 0; }
    .msg-avatar.user { background: var(--accent); color: var(--text-on-accent); }
    .msg-avatar.agent { background: var(--surface-3); color: var(--text-secondary); }
    .msg-bubble { padding: var(--space-3) var(--space-4); border-radius: var(--radius-lg); max-width: 80%; font-size: var(--fs-body-sm); line-height: var(--lh-normal); }
    .msg-bubble.user { background: var(--accent); color: var(--text-on-accent); }
    .msg-bubble.agent { background: var(--surface-3); border: 1px solid var(--border-subtle); color: var(--text-primary); }
    .msg-time { font-family: var(--font-mono); font-size: var(--fs-micro); color: var(--text-tertiary); margin-top: var(--space-1); }

    /* Timeline */
    .timeline { position: relative; padding-left: var(--space-6); }
    .timeline::before { content: ''; position: absolute; left: 9px; top: 8px; bottom: 8px; width: 2px; background: var(--border-subtle); }
    .timeline-step { position: relative; padding: var(--space-3) 0; }
    .timeline-dot { position: absolute; left: calc(-1 * var(--space-6) + 4px); top: 16px; width: 12px; height: 12px; border-radius: var(--radius-full); border: 2px solid var(--bg-base); }
    .timeline-dot.success { background: var(--status-success-fg); }
    .timeline-dot.running { background: var(--text-accent); animation: pulse 1.5s ease-in-out infinite; }
    .timeline-dot.failed { background: var(--status-error-fg); }
    .timeline-dot.retried { background: var(--status-warning-fg); }
    .timeline-dot.pending { background: var(--text-tertiary); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .step-header { display: flex; align-items: center; gap: var(--space-3); }
    .step-title { font-size: var(--fs-body-sm); font-weight: var(--fw-medium); color: var(--text-primary); }
    .step-time { font-family: var(--font-mono); font-size: var(--fs-micro); color: var(--text-tertiary); }
    .step-meta { display: flex; gap: var(--space-3); margin-top: var(--space-1); }
    .step-duration { font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--text-secondary); }
    .step-tokens { font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--text-tertiary); }
    .step-retry { margin-left: var(--space-4); padding: var(--space-2) 0; border-left: 2px solid var(--status-warning-border); padding-left: var(--space-3); }
    .step-retry-label { font-size: var(--fs-micro); color: var(--status-warning-fg); font-weight: var(--fw-medium); }
    /* Calendar */
    .calendar-header { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-4); }
    .calendar-header h2 { font-size: var(--fs-h3); font-weight: var(--fw-semibold); margin: 0; }
    .calendar-nav { background: none; border: 1px solid var(--border-default); border-radius: var(--radius-md); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); transition: var(--transition-colors); }
    .calendar-nav:hover { background: var(--surface-hover); color: var(--text-primary); }
    .calendar-nav:focus-visible { outline: 2px solid var(--border-focus); outline-offset: -2px; }
    .calendar-grid { display: grid; grid-template-columns: 100px repeat(7, 1fr); background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); overflow: hidden; }
    .cal-header-cell { padding: var(--space-3); font-size: var(--fs-micro); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--text-tertiary); text-align: center; border-bottom: 1px solid var(--border-default); background: var(--surface-2); }
    .cal-staff-cell { padding: var(--space-3); font-size: var(--fs-body-sm); font-weight: var(--fw-medium); color: var(--text-primary); border-bottom: 1px solid var(--border-subtle); border-right: 1px solid var(--border-subtle); display: flex; align-items: center; }
    .cal-day-cell { padding: var(--space-2); border-bottom: 1px solid var(--border-subtle); border-right: 1px solid var(--border-subtle); min-height: 80px; position: relative; }
    .cal-booking { background: var(--surface-2); border-left: 3px solid var(--accent); border-radius: var(--radius-sm); padding: var(--space-1-5) var(--space-2); margin-bottom: var(--space-1); font-size: var(--fs-micro); }
    .cal-booking-name { display: block; color: var(--text-primary); font-weight: var(--fw-medium); }
    .cal-booking-time { display: block; font-family: var(--font-mono); color: var(--text-tertiary); font-size: var(--fs-micro); }
    .cal-now-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: var(--status-error-fg); z-index: 2; }
    .cal-now-line::before { content: ''; position: absolute; left: -4px; top: -3px; width: 8px; height: 8px; border-radius: var(--radius-full); background: var(--status-error-fg); }

    /* Live-data and authentication states */
    .sr-only { position: absolute !important; width: 1px !important; height: 1px !important; padding: 0 !important; margin: -1px !important; overflow: hidden !important; clip: rect(0, 0, 0, 0) !important; white-space: nowrap !important; border: 0 !important; }
    .auth-shell { min-height: 100vh; display: grid; place-items: center; padding: var(--space-5); background: radial-gradient(circle at 50% 0%, var(--accent-subtle), transparent 38%), var(--bg-base); }
    .auth-card { width: min(100%, 420px); padding: var(--space-7); border: 1px solid var(--border-default); border-radius: var(--radius-xl); background: var(--surface-1); box-shadow: var(--shadow-overlay); }
    .auth-brand { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-6); }
    .auth-card h1 { margin: 0 0 var(--space-2); font-size: var(--fs-h2); }
    .auth-card p { margin: 0 0 var(--space-5); color: var(--text-secondary); }
    .field { display: flex; flex-direction: column; gap: var(--space-2); min-width: 0; }
    .field label { font-size: var(--fs-caption); font-weight: var(--fw-medium); color: var(--text-secondary); }
    .field input, .field select { min-height: 36px; padding: 0 var(--space-3); color: var(--text-primary); background: var(--surface-2); border: 1px solid var(--border-default); border-radius: var(--radius-md); font: inherit; }
    .field input:focus-visible, .field select:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 1px; }
    .primary-button, .secondary-button, .text-button { min-height: 34px; padding: 0 var(--space-4); border-radius: var(--radius-md); font: inherit; font-size: var(--fs-body-sm); font-weight: var(--fw-medium); cursor: pointer; }
    .primary-button { color: var(--text-on-accent); background: var(--accent); border: 1px solid var(--accent); }
    .secondary-button { color: var(--text-primary); background: var(--surface-2); border: 1px solid var(--border-default); }
    .text-button { min-height: 28px; padding: 0 var(--space-2); color: var(--text-secondary); background: transparent; border: 0; }
    .primary-button:focus-visible, .secondary-button:focus-visible, .text-button:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 2px; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .auth-actions { display: flex; justify-content: flex-end; margin-top: var(--space-4); }
    .auth-error { margin-top: var(--space-3); color: var(--status-error-fg); font-size: var(--fs-body-sm); }
    .page-state { min-height: 320px; display: grid; place-items: center; padding: var(--space-8); border: 1px solid var(--border-default); border-radius: var(--radius-lg); background: var(--surface-1); }
    .loading-stack { width: min(100%, 720px); display: grid; gap: var(--space-3); }
    .loading-line { height: 14px; border-radius: var(--radius-sm); background: linear-gradient(90deg, var(--skeleton-base) 0%, var(--skeleton-shine) 50%, var(--skeleton-base) 100%); background-size: 200% 100%; animation: live-shimmer 1.4s ease-in-out infinite; }
    .loading-line:nth-child(2) { width: 74%; }
    .loading-line:nth-child(3) { width: 88%; }
    @keyframes live-shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    .resource-toolbar { min-height: 28px; display: flex; align-items: center; justify-content: flex-end; gap: var(--space-2); margin-bottom: var(--space-3); color: var(--text-tertiary); font-size: var(--fs-caption); }
    .refresh-error { margin-bottom: var(--space-4); padding: var(--space-3) var(--space-4); display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); border: 1px solid var(--status-error-border); border-radius: var(--radius-md); color: var(--status-error-fg); background: var(--status-error-bg); font-size: var(--fs-body-sm); }
    .filter-bar { display: grid; grid-template-columns: minmax(200px, 1fr) 180px 180px auto; align-items: end; gap: var(--space-3); margin-bottom: var(--space-4); }
    .pagination { display: flex; align-items: center; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-4); }
    .run-link { color: var(--text-accent); font-family: var(--font-mono); font-size: var(--fs-body-sm); text-decoration: none; }
    .run-link:hover { text-decoration: underline; }
    .run-link:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 2px; border-radius: 2px; }
    .message-empty { padding: var(--space-7); color: var(--text-tertiary); text-align: center; }
    .msg-bubble { white-space: pre-wrap; overflow-wrap: anywhere; }
    .timeline-state { margin-left: var(--space-2); color: var(--text-tertiary); font-size: var(--fs-micro); text-transform: capitalize; }
    .json-details { margin-top: var(--space-2); }
    .json-details summary { color: var(--text-accent); cursor: pointer; font-size: var(--fs-caption); }
    .json-details pre { max-height: 240px; overflow: auto; margin: var(--space-2) 0 0; padding: var(--space-3); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-secondary); background: var(--surface-inset); font: var(--fs-micro)/1.5 var(--font-mono); white-space: pre-wrap; overflow-wrap: anywhere; }
    .escalation-card { margin-bottom: var(--space-4); padding: var(--space-4); border: 1px solid var(--status-warning-border); border-radius: var(--radius-lg); color: var(--status-warning-fg); background: var(--status-warning-bg); }
    .calendar-scroll { overflow-x: auto; padding-bottom: var(--space-2); }
    .calendar-scroll .calendar-grid { min-width: 980px; }
    .calendar-row { display: contents; }
    details.cal-booking { display: block; }
    .cal-booking summary { cursor: pointer; list-style: none; }
    .cal-booking summary::-webkit-details-marker { display: none; }
    .cal-booking:focus-within, .cal-booking:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 1px; }
    .cal-booking-detail { padding-top: var(--space-1); color: var(--text-secondary); line-height: 1.4; }
    .cal-block { padding: var(--space-1-5) var(--space-2); margin-bottom: var(--space-1); border: 1px dashed var(--border-default); border-radius: var(--radius-sm); color: var(--text-tertiary); background: var(--surface-2); font-size: var(--fs-micro); }
    .mobile-nav { display: none; gap: var(--space-1); padding: var(--space-2); overflow-x: auto; border-bottom: 1px solid var(--border-subtle); background: var(--surface-1); }
    .mobile-nav .nav-item { width: auto; flex: 0 0 auto; }

    /* Bottom dashboard sections */
    .bottom-row { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-4); margin-top: var(--space-5); }
    .bottom-row .attention-panel { margin-top: 0; }

    /* Responsive */
    @media (max-width: 759px) {
      .sidebar { display: none; }
      .mobile-nav { display: flex; }
      .topbar { padding: 0 var(--space-3); }
      .topbar-sub, .topbar .avatar { display: none; }

function chartTone(key, index) {
  var known = {
    telegram: 'var(--viz-1)', demo: 'var(--viz-2)', web: 'var(--viz-3)', operator: 'var(--viz-5)',
    completed: 'var(--viz-3)', escalated: 'var(--viz-4)', failed: 'var(--viz-6)',
    budget_exhausted: 'var(--viz-5)', running: 'var(--viz-2)'
  };
  return known[key] || 'var(--viz-' + ((index % 6) + 1) + ')';
}

function BookingChart(props) {
  var series = props.series || [];
  if (!series.length) return h(EmptyView, { inline: true, compact: true, title: 'No bookings in this period' });
  var grouped = {};
  var channelSet = {};
  series.forEach(function(point) {
    if (!grouped[point.date]) grouped[point.date] = {};
    grouped[point.date][point.channel] = Number(point.count) || 0;
    channelSet[point.channel] = true;
  });
  var dates = Object.keys(grouped).sort();
  var channels = Object.keys(channelSet).sort();
  var totals = dates.map(function(date) {
    return channels.reduce(function(sum, channel) { return sum + (grouped[date][channel] || 0); }, 0);
  });
  var max = Math.max.apply(Math, totals.concat([1]));
  var width = 600, height = 170, baseline = 145, plotHeight = 120, left = 28;
  var groupWidth = (width - left) / dates.length;
  var barWidth = Math.max(1.5, groupWidth * .7);
  var labelEvery = Math.max(1, Math.ceil(dates.length / 7));
  var shapes = [];
  dates.forEach(function(date, dateIndex) {
    var stack = 0;
    channels.forEach(function(channel, channelIndex) {
      var count = grouped[date][channel] || 0;
      if (!count) return;
      var rectHeight = count / max * plotHeight;
      var y = baseline - stack - rectHeight;
      shapes.push(h('rect', {
        key: date + channel, x: left + dateIndex * groupWidth + (groupWidth - barWidth) / 2,
        y: y, width: barWidth, height: rectHeight, rx: 1, fill: chartTone(channel, channelIndex)
      }, h('title', null, formatDateKey(date, { month: 'short', day: 'numeric' }) + ': ' + channelLabel(channel) + ' ' + count)));
      stack += rectHeight;
    });
    if (dateIndex % labelEvery === 0 || dateIndex === dates.length - 1) {
      shapes.push(h('text', {
        key: date + '-label', x: left + dateIndex * groupWidth + groupWidth / 2, y: 162,
        textAnchor: 'middle', fill: 'var(--text-tertiary)', fontSize: 9, fontFamily: 'var(--font-mono)'
      }, formatDateKey(date, { month: 'numeric', day: 'numeric' })));
    }
  });
  return h(React.Fragment, null,
    h('svg', {
      width: '100%', height: 170, viewBox: '0 0 600 170', role: 'img',
      'aria-label': 'Bookings by date and channel. ' + formatNumber(totals.reduce(function(a, b) { return a + b; }, 0)) + ' total bookings.'
    },
      h('line', { x1: left, x2: width, y1: baseline, y2: baseline, stroke: 'var(--border-subtle)' }),
      shapes
    ),
    h('div', { className: 'chart-legend' }, channels.map(function(channel, index) {
      return h('span', { key: channel, className: 'legend-item' },
        h('span', { className: 'legend-dot', style: { background: chartTone(channel, index) }, 'aria-hidden': 'true' }),
        channelLabel(channel)
      );
    }))
  );
}

function OutcomeChart(props) {
  var outcomes = (props.outcomes || []).filter(function(item) { return Number(item.count) > 0; });
  var total = outcomes.reduce(function(sum, item) { return sum + Number(item.count); }, 0);
  if (!total) return h(EmptyView, { inline: true, compact: true, title: 'No runs in this period' });
  var radius = 54, circumference = 2 * Math.PI * radius, offset = 0;
  var circles = outcomes.map(function(item, index) {
    var length = Number(item.count) / total * circumference;
    var circle = h('circle', {
      key: item.status, cx: 80, cy: 80, r: radius, fill: 'none', stroke: chartTone(item.status, index),
      strokeWidth: 18, strokeDasharray: length + ' ' + (circumference - length), strokeDashoffset: -offset,
      transform: 'rotate(-90 80 80)'
    }, h('title', null, statusLabel(item.status) + ': ' + item.count));
    offset += length;
    return circle;
  });
  return h(React.Fragment, null,
    h('svg', {
      width: 160, height: 160, viewBox: '0 0 160 160', role: 'img',
      'aria-label': 'Run outcomes. ' + outcomes.map(function(item) { return statusLabel(item.status) + ' ' + item.count; }).join(', ') + '.',
      style: { display: 'block', margin: '0 auto' }
    },

      h('text', { x: 80, y: 85, textAnchor: 'middle', fill: 'var(--text-primary)', fontSize: 20, fontFamily: 'var(--font-mono)' }, formatNumber(total))
    ),
    h('div', { className: 'chart-legend', style: { justifyContent: 'center', flexWrap: 'wrap' } },
      outcomes.map(function(item, index) {
        return h('span', { key: item.status, className: 'legend-item' },

function RunsScreen(props) {
  var draftPair = React.useState('');
  var draft = draftPair[0];
  var setDraft = draftPair[1];
  var queryPair = React.useState('');
  var query = queryPair[0];
  var setQuery = queryPair[1];
  var statusPair = React.useState('');
  var status = statusPair[0];
  var setStatus = statusPair[1];
  var channelPair = React.useState('');
  var channel = channelPair[0];
  var setChannel = channelPair[1];
  var cursorPair = React.useState('');
  var cursor = cursorPair[0];
  var setCursor = cursorPair[1];
  var historyPair = React.useState([]);
  var cursorHistory = historyPair[0];
  var setCursorHistory = historyPair[1];

  function resetPage() {
    setCursor('');
    setCursorHistory([]);
  }

  var params = new URLSearchParams();
  params.set('limit', '50');
  if (status) params.set('status', status);
  if (channel) params.set('channel', channel);
  if (query) params.set('q', query);
  if (cursor) params.set('cursor', cursor);
  var requestPath = '/runs?' + params.toString();
  var resource = usePollingResource(
    'runs:' + params.toString(),
    function(signal) { return fetchJSON(requestPath, signal); },
    10000,
    true
  );

  function submitSearch(event) {
    event.preventDefault();
    setQuery(draft.trim());
    resetPage();
  }

  function previousPage() {
    if (!cursorHistory.length) return;
    var previous = cursorHistory[cursorHistory.length - 1];
    setCursorHistory(cursorHistory.slice(0, -1));
    setCursor(previous);
  }

  function nextPage() {
    if (!resource.data || !resource.data.next_cursor) return;
    setCursorHistory(cursorHistory.concat([cursor]));
    setCursor(resource.data.next_cursor);
  }

  return h('section', { 'aria-busy': resource.loading || resource.refreshing ? 'true' : 'false' },
    h('h1', { className: 'sr-only' }, 'Agent runs'),
    h('form', { className: 'filter-bar', onSubmit: submitSearch, role: 'search' },
      h('div', { className: 'field' },
        h('label', { htmlFor: 'runs-query' }, 'Run ID or customer'),
        h('input', { id: 'runs-query', type: 'search', value: draft, onChange: function(event) { setDraft(event.target.value); }, placeholder: 'Search runs' })
      ),
      h('div', { className: 'field' },
        h('label', { htmlFor: 'runs-status' }, 'Status'),
        h('select', { id: 'runs-status', value: status, onChange: function(event) { setStatus(event.target.value); resetPage(); } },
          h('option', { value: '' }, 'All statuses'),
          ['running', 'completed', 'escalated', 'failed', 'budget_exhausted'].map(function(value) {
            return h('option', { key: value, value: value }, statusLabel(value));
          })
        )
      ),
      h('div', { className: 'field' },
        h('label', { htmlFor: 'runs-channel' }, 'Channel'),
        h('select', { id: 'runs-channel', value: channel, onChange: function(event) { setChannel(event.target.value); resetPage(); } },
          h('option', { value: '' }, 'All channels'),
          ['telegram', 'demo', 'web'].map(function(value) {
            return h('option', { key: value, value: value }, channelLabel(value));
          })
        )
      ),
      h('button', { type: 'submit', className: 'secondary-button' }, 'Search')
    ),
    resource.loading ? h(LoadingState, { label: 'Loading runs' }) : null,
    resource.error && !resource.data ? h(ErrorView, { error: resource.error, onRetry: resource.retry, title: 'Could not load runs' }) : null,
    resource.data ? h(React.Fragment, null,
      h(ResourceToolbar, { resource: resource }),
      h(RunTable, {
        rows: resource.data.items, timezone: props.timezone, showTokens: true,
        label: 'Filtered agent runs', emptyTitle: 'No runs match', emptyDescription: 'Adjust the status, channel, or search query.'
      }),
      h('div', { className: 'pagination', 'aria-label': 'Runs pagination' },
        h('button', { type: 'button', className: 'secondary-button', disabled: !cursorHistory.length, onClick: previousPage }, 'Previous'),
        h('button', { type: 'button', className: 'secondary-button', disabled: !resource.data.next_cursor, onClick: nextPage }, 'Next')
      )
    ) : null
  );
}

function initials(name) {
  return String(name || '?').split(/\s+/).filter(Boolean).slice(0, 2).map(function(part) { return part.charAt(0); }).join('').toUpperCase() || '?';
}

function timelineState(status, attempts) {
  if (attempts && attempts.length > 1) return 'retried';
  if (status === 'completed' || status === 'succeeded' || status === 'success') return 'success';
  if (status === 'failed' || status === 'budget_exhausted' || status === 'refused') return 'failed';
  if (status === 'running') return 'running';
  return 'pending';
}

function buildTimeline(run, timezone) {
  var iterations = (run.iterations || []).slice().sort(function(a, b) { return a.iteration - b.iteration; });
  var tools = (run.tools || []).slice().sort(function(a, b) {
    return a.iteration - b.iteration || a.call_index - b.call_index;
  });
  var result = [];
  iterations.forEach(function(iteration) {
    result.push({
      id: 'iteration:' + iteration.iteration,
      marker: 'I' + iteration.iteration + ' \u00b7 ' + formatTime(iteration.started_at, timezone),
      title: 'Model iteration ' + iteration.iteration,
      state: timelineState(iteration.status),
      status: iteration.status,
      duration: formatDuration(iteration.duration_ms),
      tokens: (Number(iteration.prompt_tokens) || 0) + (Number(iteration.completion_tokens) || 0),
      detail: iteration.error_message || (iteration.finish_reason ? 'Finish reason: ' + iteration.finish_reason : ''),
      payload: null,
      attempts: []
    });
    tools.filter(function(tool) { return tool.iteration === iteration.iteration; }).forEach(function(tool) {
      var attempts = tool.attempts || [];
      result.push({
        id: 'tool:' + tool.id,
        marker: 'I' + tool.iteration + ' \u00b7 ' + (tool.started_at ? formatTime(tool.started_at, timezone) : tool.call_index + '/' + tool.call_count),
        title: tool.name,
        state: timelineState(tool.status, attempts),
        status: tool.status,
        duration: formatDuration(tool.duration_ms),
        tokens: null,
        detail: tool.contract_version ? 'Contract ' + tool.contract_version : '',
        payload: { arguments: tool.arguments, result: tool.result },
        attempts: attempts
      });
    });
  });
  tools.filter(function(tool) {
    return !iterations.some(function(iteration) { return iteration.iteration === tool.iteration; });
  }).forEach(function(tool) {
    result.push({
      id: 'tool:' + tool.id, marker: 'I' + tool.iteration + (tool.started_at ? ' \u00b7 ' + formatTime(tool.started_at, timezone) : ''), title: tool.name,
      state: timelineState(tool.status, tool.attempts), status: tool.status,
      duration: formatDuration(tool.duration_ms), tokens: null,
      payload: { arguments: tool.arguments, result: tool.result }, attempts: tool.attempts || []
    });
  });
  return result;
}

                message.id === run.trigger_message_id ? h('span', { className: 'sr-only' }, ' This message triggered the run.') : null
              ),
              h('div', { className: 'msg-time' }, formatInstant(message.created_at, props.timezone))
            )
          );
        }) : h('div', { className: 'message-empty' }, 'No conversation messages were recorded.')
      ),
      h('section', { 'aria-label': 'Execution details' }, h(TimelineView, { steps: steps, timezone: props.timezone }))
    )
  );
}

function bookingBorder(status) {
  if (status === 'cancelled' || status === 'no_show') return 'var(--status-error-fg)';
  if (status === 'confirmed' || status === 'checked_in' || status === 'completed') return 'var(--status-success-fg)';
  return 'var(--accent)';
}

// CustomerPicker is a searchable, debounced select over /operator/customers,
// used only by the create-booking form. It keeps its own small result cache
// so retyping a recent query does not re-hit the network.
function CustomerPicker(props) {
  var queryPair = React.useState('');
  var query = queryPair[0];
  var setQuery = queryPair[1];
  var itemsPair = React.useState([]);
  var items = itemsPair[0];
  var setItems = itemsPair[1];
  var openPair = React.useState(false);
  var open = openPair[0];
  var setOpen = openPair[1];

  React.useEffect(function() {
    var active = true;
    var timer = window.setTimeout(function() {
      fetchJSON('/customers?q=' + encodeURIComponent(query) + '&limit=10')
        .then(function(result) { if (active) setItems((result && result.items) || []); })
        .catch(function() { if (active) setItems([]); });
    }, 200);
    return function() { active = false; window.clearTimeout(timer); };
  }, [query]);

  function choose(customer) {
    props.onChange(customer);
    setQuery(customer.display_name);
    setOpen(false);
  }

  return h('div', { className: 'field', style: { position: 'relative' } },
    h('label', { htmlFor: 'booking-customer' }, 'Customer'),
    h('input', {
      id: 'booking-customer', type: 'text', autoComplete: 'off', value: query,
      placeholder: 'Search by name, email, or phone',
      onChange: function(event) {
        setQuery(event.target.value);
        setOpen(true);
        if (props.value) props.onChange(null);
      },
      onFocus: function() { setOpen(true); },
      'aria-expanded': open && items.length ? 'true' : 'false',
      'aria-autocomplete': 'list'
    }),
    open && items.length ? h('ul', {
      role: 'listbox', 'aria-label': 'Matching customers',
      style: {
        position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 20, margin: '4px 0 0', padding: '4px',
        listStyle: 'none', background: 'var(--surface-2)', border: '1px solid var(--border-default)',
        borderRadius: 'var(--radius-md)', boxShadow: 'var(--shadow-overlay)', maxHeight: 220, overflowY: 'auto'
      }
    }, items.map(function(customer) {
      return h('li', { key: customer.id, role: 'option' },
        h('button', {
          type: 'button',
          style: { display: 'block', width: '100%', textAlign: 'left', padding: '6px 8px', border: 0, background: 'none', color: 'var(--text-primary)', cursor: 'pointer', borderRadius: 'var(--radius-sm)' },
          onClick: function() { choose(customer); }
        }, customer.display_name + ' \u00b7 ' + (customer.email || customer.phone || ''))
      );
    })) : null
  );
}

// BookingCommandModal handles all three operator write commands: creating a
// walk-in booking, rescheduling one to a new time, or cancelling it with a
// reason. It converts wall-clock input in the tenant's timezone to the
// RFC3339 UTC instants the API expects, and surfaces a 409 schedule-version
// conflict with an explicit "reload and retry" affordance rather than a
// generic error, since the operator's view is now known to be stale.
function BookingCommandModal(props) {
  var mode = props.mode; // 'create' | 'reschedule' | 'cancel'
  var booking = props.booking || null;
  var seed = mode === 'reschedule' && booking ? instantToZonedFields(booking.starts_at, props.timezone) : { date: '', time: '' };

  var customerPair = React.useState(null);
  var customer = customerPair[0];
  var setCustomer = customerPair[1];
  var serviceIDPair = React.useState((props.services && props.services[0] && props.services[0].id) || '');
  var serviceID = serviceIDPair[0];
  var setServiceID = serviceIDPair[1];
  var staffIDPair = React.useState(props.staffID || (props.staff && props.staff[0] && props.staff[0].id) || '');
  var staffID = staffIDPair[0];
  var setStaffID = staffIDPair[1];
  var datePair = React.useState(props.date || seed.date);
  var dateValue = datePair[0];
  var setDateValue = datePair[1];
  var timePair = React.useState(seed.time);
  var timeValue = timePair[0];
  var setTimeValue = timePair[1];
  var notesPair = React.useState('');
  var notes = notesPair[0];
  var setNotes = notesPair[1];
  var reasonPair = React.useState('');
  var reason = reasonPair[0];
  var setReason = reasonPair[1];
  var busyPair = React.useState(false);
  var busy = busyPair[0];
  var setBusy = busyPair[1];
  var errorPair = React.useState('');
  var error = errorPair[0];
  var setError = errorPair[1];
  var conflictPair = React.useState(false);
  var conflict = conflictPair[0];
  var setConflict = conflictPair[1];

  var titles = { create: 'Add appointment', reschedule: 'Reschedule appointment', cancel: 'Cancel appointment' };

  async function submit(event) {
    event.preventDefault();
    setError('');
    setConflict(false);
    if (mode === 'create' && (!customer || !serviceID || !staffID || !dateValue || !timeValue)) {
      setError('Choose a customer, service, staff member, date, and time.');
      return;
    }
    if (mode === 'reschedule' && (!dateValue || !timeValue)) {
      setError('Choose a new date and time.');
      return;
    }
    if (mode === 'cancel' && !reason.trim()) {
      setError('A cancellation reason is required.');
      return;
    }
    setBusy(true);
    try {
      if (mode === 'create') {
        var startsAt = zonedTimeToUtcISOString(dateValue, timeValue, props.timezone);
        await sendJSON('POST', '/bookings', {
          customer_id: customer.id, service_id: serviceID, staff_id: staffID,
          starts_at: startsAt, notes: notes, idempotency_key: 'op-' + randomIdempotencyKey()
        });
      } else if (mode === 'reschedule') {
        var newStartsAt = zonedTimeToUtcISOString(dateValue, timeValue, props.timezone);
        await sendJSON('POST', '/bookings/' + encodeURIComponent(booking.id) + '/reschedule', {
          expected_version: booking.schedule_version, starts_at: newStartsAt,
          idempotency_key: 'op-' + randomIdempotencyKey()
        });
      } else {
        await sendJSON('POST', '/bookings/' + encodeURIComponent(booking.id) + '/cancel', {
          expected_version: booking.schedule_version, reason: reason.trim(),
          idempotency_key: 'op-' + randomIdempotencyKey()
        });
      }
      props.onSuccess();
    } catch (requestError) {
      if (requestError.status === 409) {
        setConflict(true);
        setError('This booking changed since it was loaded.');
      } else {
        setError(errorMessage(requestError));
      }
    } finally {
      setBusy(false);
    }
  }

  var content = h('form', { onSubmit: submit, 'aria-busy': busy ? 'true' : 'false' },
    mode === 'create' ? h(CustomerPicker, { value: customer, onChange: setCustomer }) : null,
    mode === 'create' ? h('div', { className: 'field' },
      h('label', { htmlFor: 'booking-service' }, 'Service'),
      h('select', { id: 'booking-service', value: serviceID, onChange: function(event) { setServiceID(event.target.value); } },
        (props.services || []).map(function(service) {
          return h('option', { key: service.id, value: service.id }, service.name + ' (' + service.duration_minutes + ' min)');
        })
      )
    ) : null,
    mode === 'create' ? h('div', { className: 'field' },
      h('label', { htmlFor: 'booking-staff' }, 'Staff'),
      h('select', { id: 'booking-staff', value: staffID, onChange: function(event) { setStaffID(event.target.value); } },
        (props.staff || []).map(function(member) {
          return h('option', { key: member.id, value: member.id }, member.display_name);
        })
      )
    ) : null,
    mode !== 'cancel' ? h('div', { style: { display: 'flex', gap: 'var(--space-3)' } },
      h('div', { className: 'field', style: { flex: 1 } },
        h('label', { htmlFor: 'booking-date' }, 'Date'),
        h('input', { id: 'booking-date', type: 'date', value: dateValue, onChange: function(event) { setDateValue(event.target.value); } })
      ),
      h('div', { className: 'field', style: { flex: 1 } },
        h('label', { htmlFor: 'booking-time' }, 'Time (' + props.timezone + ')'),
        h('input', { id: 'booking-time', type: 'time', value: timeValue, onChange: function(event) { setTimeValue(event.target.value); } })
      )
    ) : null,
    mode === 'create' ? h('div', { className: 'field' },
      h('label', { htmlFor: 'booking-notes' }, 'Notes (optional)'),
      h('input', { id: 'booking-notes', type: 'text', maxLength: 500, value: notes, onChange: function(event) { setNotes(event.target.value); } })
    ) : null,
    mode === 'cancel' ? h('div', { className: 'field' },
      h('label', { htmlFor: 'booking-reason' }, 'Reason'),
      h('input', { id: 'booking-reason', type: 'text', maxLength: 500, value: reason, onChange: function(event) { setReason(event.target.value); }, autoFocus: true })
    ) : null,
    error ? h('div', { className: 'auth-error', role: 'alert' },
      error,
      conflict ? h('div', { style: { marginTop: 'var(--space-2)' } },
        h('button', { type: 'button', className: 'text-button', onClick: props.onConflictReload }, 'Reload the calendar and try again')
      ) : null
    ) : null,
    h('div', { className: 'auth-actions', style: { justifyContent: 'space-between' } },
      h('button', { type: 'button', className: 'secondary-button', onClick: props.onClose, disabled: busy }, 'Cancel'),
      h('button', { type: 'submit', className: mode === 'cancel' ? 'secondary-button' : 'primary-button', disabled: busy },
        busy ? 'Saving\u2026' : (mode === 'create' ? 'Create booking' : mode === 'reschedule' ? 'Save new time' : 'Cancel booking')
      )
    )
  );

  if (DS.Modal) {
    return h(DS.Modal, { open: true, onClose: props.onClose, title: titles[mode] }, content);
  }
  return h('div', {
    role: 'dialog', 'aria-modal': 'true', 'aria-label': titles[mode],
    style: { position: 'fixed', inset: 0, zIndex: 50, display: 'grid', placeItems: 'center', background: 'rgba(0,0,0,.5)' }
  },
    h('div', { style: { width: 'min(90vw, 420px)', padding: 'var(--space-6)', background: 'var(--surface-1)', border: '1px solid var(--border-default)', borderRadius: 'var(--radius-xl)', boxShadow: 'var(--shadow-overlay)' } },
      h('h2', { style: { marginTop: 0 } }, titles[mode]),
      content
    )
  );
}

function CalendarScreen(props) {
  var initialWeek = startOfWeek(dateKeyInTimezone(new Date(), props.timezone));
  var weekPair = React.useState(initialWeek);
  var weekStart = weekPair[0];
  var setWeekStart = weekPair[1];
  var weekEnd = addDays(weekStart, 7);
  var requestPath = '/calendar?from=' + encodeURIComponent(weekStart) + '&to=' + encodeURIComponent(weekEnd);
  var resource = usePollingResource(
    'calendar:' + weekStart,
    function(signal) { return fetchJSON(requestPath, signal); },
    10000,
    true
  );
  var selectedPair = React.useState(null); // { booking } for the detail drawer
  var selected = selectedPair[0];
  var setSelected = selectedPair[1];
  var commandPair = React.useState(null); // { mode, booking, staffID, date }
  var command = commandPair[0];
  var setCommand = commandPair[1];

  if (resource.loading) return h(LoadingState, { label: 'Loading calendar' });
  if (resource.error && !resource.data) return h(ErrorView, { error: resource.error, onRetry: resource.retry, title: 'Could not load the calendar' });

  var data = resource.data;
  var timezone = data.timezone || props.timezone;
  var days = Array.from({ length: 7 }, function(_, index) { return addDays(weekStart, index); });
  var bookings = data.bookings || [];
  var blocks = data.blocks || [];
  var hasEvents = bookings.length > 0 || blocks.length > 0;

  function cellBookings(staffID, day) {
    return bookings.filter(function(booking) {
      return booking.staff_id === staffID && dateKeyInTimezone(booking.starts_at, timezone) === day;
    });
  }

  function cellBlocks(staffID, day) {
    return blocks.filter(function(block) {
      return block.staff_id === staffID && dateKeyInTimezone(block.starts_at, timezone) === day;
    });
  }

  function openBooking(booking) { setSelected({ booking: booking }); }
  function openCommand(mode, booking, staffID, day) {
    setSelected(null);
    setCommand({ mode: mode, booking: booking || null, staffID: staffID || '', date: day || '' });
  }
  function afterCommandSuccess() {
    setCommand(null);
    resource.retry();
  }

  return h('section', { 'aria-busy': resource.refreshing ? 'true' : 'false' },
    h('h1', { className: 'sr-only' }, 'Week calendar'),
    h(ResourceToolbar, { resource: resource }),
    h('div', { className: 'calendar-header' },
      h('button', { type: 'button', className: 'calendar-nav', 'aria-label': 'Previous week', onClick: function() { setWeekStart(addDays(weekStart, -7)); } }, h(Icon, { name: 'chevronLeft' })),
      h('h2', { 'aria-live': 'polite' }, formatDateKey(weekStart, { month: 'short', day: 'numeric', year: 'numeric' }) + ' \u2013 ' + formatDateKey(addDays(weekStart, 6), { month: 'short', day: 'numeric', year: 'numeric' })),
      h('button', { type: 'button', className: 'calendar-nav', 'aria-label': 'Next week', onClick: function() { setWeekStart(addDays(weekStart, 7)); } }, h(Icon, { name: 'chevronRight' })),
      h('button', {
        type: 'button', className: 'primary-button', style: { marginLeft: 'auto' },
        onClick: function() { openCommand('create', null, (data.staff[0] && data.staff[0].id) || '', weekStart); },
        disabled: !data.staff.length || !data.services.length
      }, 'Add appointment')
    ),
    !data.staff.length ? h(EmptyView, { title: 'No active staff', description: 'The calendar will appear when an active staff member is configured.' }) : h(React.Fragment, null,
      !hasEvents ? h(EmptyView, { inline: true, compact: true, title: 'No bookings this week', description: 'The schedule is currently clear.' }) : null,
      h('div', { className: 'calendar-scroll', tabIndex: 0, 'aria-label': 'Scrollable weekly calendar' },
        h('div', { className: 'calendar-grid', role: 'grid', 'aria-label': 'Bookings from ' + weekStart + ' through ' + addDays(weekStart, 6) },
          h('div', { className: 'calendar-row', role: 'row' },
            h('div', { className: 'cal-header-cell', role: 'columnheader' }, 'Staff'),
            days.map(function(day) {
              return h('div', { key: day, className: 'cal-header-cell', role: 'columnheader' }, formatDateKey(day, { weekday: 'short', month: 'short', day: 'numeric' }));
            })
          ),
          data.staff.map(function(staff) {
            return h('div', { key: staff.id, className: 'calendar-row', role: 'row' },
              h('div', { className: 'cal-staff-cell', role: 'rowheader' }, staff.display_name),
              days.map(function(day) {
                var dayBookings = cellBookings(staff.id, day);
                var dayBlocks = cellBlocks(staff.id, day);
                return h('div', { key: day, className: 'cal-day-cell', role: 'gridcell', 'aria-label': staff.display_name + ', ' + formatDateKey(day, { weekday: 'long', month: 'long', day: 'numeric' }) },
                  dayBookings.map(function(booking) {
                    var time = formatTime(booking.starts_at, timezone) + '\u2013' + formatTime(booking.ends_at, timezone);
                    return h('button', {
                      key: booking.id, type: 'button', className: 'cal-booking',
                      style: { display: 'block', width: '100%', textAlign: 'left', border: 0, borderLeft: '3px solid ' + bookingBorder(booking.status), font: 'inherit', cursor: 'pointer' },
                      'aria-label': booking.customer_name + ', ' + booking.service_name + ', ' + time + ', ' + statusLabel(booking.status),
                      onClick: function() { openBooking(booking); }
                    },
                      h('span', { className: 'cal-booking-name' }, booking.customer_name),
                      h('span', { className: 'cal-booking-time' }, time)
                    );
                  }),
                  dayBlocks.map(function(block) {
                    return h('div', { key: block.id, className: 'cal-block' },
                      statusLabel(block.kind) + ' \u00b7 ' + formatTime(block.starts_at, timezone) + '\u2013' + formatTime(block.ends_at, timezone),
                      block.note ? h('div', null, block.note) : null
                    );
                  }),
                  h('button', {
                    type: 'button',
                    'aria-label': 'Add appointment for ' + staff.display_name + ' on ' + formatDateKey(day, { weekday: 'long', month: 'long', day: 'numeric' }),
                    style: {
                      display: 'block', width: '100%', marginTop: 'var(--space-1)', padding: 'var(--space-0-5)',
                      border: '1px dashed var(--border-default)', borderRadius: 'var(--radius-sm)', background: 'transparent',
                      color: 'var(--text-tertiary)', cursor: 'pointer', font: 'inherit', fontSize: 'var(--fs-micro)'
                    },
                    onClick: function() { openCommand('create', null, staff.id, day); }
                  }, '+')
                );
              })
            );
          })
        )
      ),
      h('div', { className: 'resource-toolbar' }, 'Times shown in ' + timezone)
    ),
    selected ? h(BookingDetailDrawer, {
      booking: selected.booking, timezone: timezone,
      onClose: function() { setSelected(null); },
      onCommand: function(mode, booking) { openCommand(mode, booking); }
    }) : null,
    command ? h(BookingCommandModal, {
      mode: command.mode, booking: command.booking, timezone: timezone,
      services: data.services, staff: data.staff, staffID: command.staffID, date: command.date,
      onClose: function() { setCommand(null); },
      onSuccess: afterCommandSuccess,
      onConflictReload: afterCommandSuccess
    }) : null
  );
}

// ── Router & App ──────────────────────────────────────────────────────────────

function getRoute() {
  var hash = window.location.hash || '#/';
  if (hash === '#/' || hash === '#/dashboard') return { name: 'dashboard', id: '' };
  if (hash === '#/runs' || hash === '#/runs/') return { name: 'runs', id: '' };
  var match = hash.match(/^#\/runs\/([^/?#]+)$/);
  if (match) {
    try { return { name: 'trace', id: decodeURIComponent(match[1]) }; }
    catch (_) { return { name: 'trace', id: '' }; }
  }
  if (hash === '#/calendar') return { name: 'calendar', id: '' };
  return { name: 'dashboard', id: '' };
}

function App() {
  var tokenPair = React.useState(storedToken());
  var token = tokenPair[0];
  var setToken = tokenPair[1];
  var routeState = React.useState(getRoute());
  var route = routeState[0];
  var setRoute = routeState[1];
  var rangePair = React.useState('7d');
  var range = rangePair[0];
  var setRange = rangePair[1];

  function logout() {
    var sessionToken = storedToken();
    saveToken('');
    setToken('');
    if (!sessionToken) return;
    window.fetch(API_BASE + '/logout', {
      method: 'POST',
      headers: { Accept: 'application/json', Authorization: 'Bearer ' + sessionToken },
      cache: 'no-store'
    }).catch(function() {
      // Local removal remains intentional when the network is unavailable.
    });
  }

  React.useEffect(function() {
    function onHash() { setRoute(getRoute()); }
    window.addEventListener('hashchange', onHash);
    return function() { window.removeEventListener('hashchange', onHash); };
  }, []);

  React.useEffect(function() {
    window.addEventListener('kontor:operator-unauthorized', logout);
    return function() { window.removeEventListener('kontor:operator-unauthorized', logout); };
  }, []);

  React.useEffect(function() {
    var titles = { dashboard: 'Dashboard', runs: 'Runs', trace: 'Agent Trace', calendar: 'Calendar' };
    document.title = (token ? (titles[route.name] || 'Operator') : 'Operator access') + ' \u00b7 Kontor';
    var main = document.getElementById('operator-main');
    if (main) main.focus();
  }, [token, route.name, route.id]);

  var sessionResource = usePollingResource(
    'operator-session',
    function(signal) { return fetchJSON('/session', signal); },
    0,
    !!token
  );

  if (!token) return h(AuthGate, { onAuthenticated: function(value) { setToken(value); } });
  if (sessionResource.error && !sessionResource.data) {
    return h('main', { className: 'auth-shell' },
      h('div', null,
        h(ErrorView, { error: sessionResource.error, onRetry: sessionResource.retry, title: 'Could not start the operator session' }),
        h('div', { style: { textAlign: 'center', marginTop: 'var(--space-3)' } },
          h('button', { type: 'button', className: 'text-button', onClick: logout }, 'Sign in again')
        )
      )
    );
  }
  if (sessionResource.loading || !sessionResource.data) {
    return h('main', { className: 'auth-shell' }, h(LoadingState, { label: 'Loading operator session' }));
  }

  var session = sessionResource.data;

  var screen;
  switch (route.name) {
    case 'runs': screen = h(RunsScreen, { timezone: session.timezone }); break;
    case 'trace': screen = h(TraceScreen, { runID: route.id, timezone: session.timezone }); break;
    case 'calendar': screen = h(CalendarScreen, { timezone: session.timezone }); break;
    default: screen = h(DashboardScreen, { range: range, timezone: session.timezone });
  }

  var currentNav = route.name === 'trace' ? 'runs' : route.name;

  return h('div', { className: 'app-shell' },
    h(Sidebar, { current: currentNav, session: session }),
    h('div', { className: 'main-area' },
      h(Topbar, { current: route.name, session: session, range: range, onRangeChange: setRange, onLogout: logout }),
      h(MobileNav, { current: currentNav }),
      h('main', { id: 'operator-main', className: 'content', tabIndex: -1 }, screen)
    )
  );
}
