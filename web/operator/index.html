    .sidebar-title { font-weight: var(--fw-semibold); font-size: var(--fs-body-lg); color: var(--text-primary); }

    .topbar-sub { font-size: var(--fs-body-sm); color: var(--text-tertiary); }
    .topbar-right { display: flex; align-items: center; gap: var(--space-3); }
    .range-tabs { display: flex; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-default); }

    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; padding: var(--space-5); }
    /* KPI Grid */
    .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: var(--space-4); margin-bottom: var(--space-5); }
    .kpi-card { background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-2); }
    .kpi-label { font-size: var(--fs-micro); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--text-tertiary); }
    .kpi-value { font-family: var(--font-mono); font-size: var(--fs-h2); font-weight: var(--fw-semibold); color: var(--text-primary); }
    .kpi-sparkline { height: 34px; width: 100%; }
    .kpi-delta { font-size: var(--fs-caption); font-weight: var(--fw-medium); }
    .kpi-delta.positive { color: var(--status-success-fg); }
    .kpi-delta.negative { color: var(--status-error-fg); }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-4); margin-bottom: var(--space-5); }
    .chart-card { background: var(--surface-1); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-5); }
    .chart-title { font-size: var(--fs-body-lg); font-weight: var(--fw-semibold); color: var(--text-primary); margin-bottom: var(--space-1); }
    .chart-subtitle { font-size: var(--fs-body-sm); color: var(--text-tertiary); margin-bottom: var(--space-4); }
    .chart-legend { display: flex; gap: var(--space-4); margin-top: var(--space-3); }
    .legend-item { display: flex; align-items: center; gap: var(--space-2); font-size: var(--fs-caption); color: var(--text-secondary); }
    .legend-dot { width: 8px; height: 8px; border-radius: var(--radius-full); }

    .data-table { width: 100%; border-collapse: collapse; font-size: var(--fs-body-sm); }
    .data-table th { text-align: left; padding: var(--space-3) var(--space-4); font-size: var(--fs-micro); font-weight: var(--fw-medium); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--text-tertiary); border-bottom: 1px solid var(--border-default); background: var(--surface-2); white-space: nowrap; }
    .data-table td { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); }
    .data-table tr[role="button"] { cursor: pointer; transition: var(--transition-colors); }

    /* Attention panel */

    .attention-dot { width: 8px; height: 8px; border-radius: var(--radius-full); flex-shrink: 0; margin-top: 6px; }

    .attention-dot.error { background: var(--status-error-fg); }
    .attention-body { flex: 1; }
    .attention-item-title { font-size: var(--fs-body-sm); font-weight: var(--fw-medium); color: var(--text-primary); }

      .sidebar { display: none; }
    }
    @media (max-width: 1100px) {
      .trace-layout { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(3, 1fr); }

      .charts-row { grid-template-columns: 1fr; }
      .bottom-row { grid-template-columns: 1fr; }
    }
  </style>

function generateSparkline(seed) {
  var points = [];
  var y = 17;
  for (var i = 0; i < 12; i++) {
    y = Math.max(4, Math.min(30, y + (Math.sin(seed * 3 + i) * 8)));
    points.push(Math.round(i * 12) + ',' + Math.round(y));
  }
  return points.join(' ');
}

function renderBarChart() {
  var bars = [];
  var barW = 12;
  var gap = 14;
  for (var i = 0; i < 15; i++) {
    var h1 = 30 + Math.round(Math.sin(i * 0.8) * 20 + Math.cos(i * 1.2) * 15);
    var h2 = 20 + Math.round(Math.cos(i * 1.1) * 15 + Math.sin(i * 0.5) * 10);
    var x = 20 + i * (barW * 2 + gap);
    bars.push(h('rect', { key: 'a' + i, x: x, y: 150 - h1, width: barW, height: h1, fill: 'var(--viz-1)', rx: 2 }));
    bars.push(h('rect', { key: 'b' + i, x: x + barW + 2, y: 150 - h2, width: barW, height: h2, fill: 'var(--viz-2)', rx: 2 }));
  }
  return bars;
}

function renderDonut() {
  function arc(cx, cy, r, startAngle, endAngle) {
    var s = startAngle * Math.PI / 180;
    var e = endAngle * Math.PI / 180;
    var x1 = cx + r * Math.cos(s), y1 = cy + r * Math.sin(s);
    var x2 = cx + r * Math.cos(e), y2 = cy + r * Math.sin(e);
    var large = endAngle - startAngle > 180 ? 1 : 0;
    return 'M ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x2 + ' ' + y2;
  }
  var r = 60, cx = 80, cy = 80;
  return [
    h('path', { key: 'd1', d: arc(cx, cy, r, 0, 270), fill: 'none', stroke: 'var(--viz-1)', strokeWidth: 20, strokeLinecap: 'round' }),
    h('path', { key: 'd2', d: arc(cx, cy, r, 274, 328), fill: 'none', stroke: 'var(--viz-4)', strokeWidth: 20, strokeLinecap: 'round' }),
    h('path', { key: 'd3', d: arc(cx, cy, r, 332, 356), fill: 'none', stroke: 'var(--viz-6)', strokeWidth: 20, strokeLinecap: 'round' })
  ];
}

// ── Router & App ──────────────────────────────────────────────────────────────

function getRoute() {
  var hash = window.location.hash || '#/';
  if (hash === '#/' || hash === '#/dashboard') return 'dashboard';
  if (hash === '#/runs') return 'runs';
  if (hash.indexOf('#/trace') === 0) return 'trace';
  if (hash === '#/calendar') return 'calendar';
  if (hash === '#/settings') return 'settings';
  return 'dashboard';
}

function App() {
  var routeState = React.useState(getRoute());
  var route = routeState[0];
  var setRoute = routeState[1];

  React.useEffect(function() {
    function onHash() { setRoute(getRoute()); }
    window.addEventListener('hashchange', onHash);
    return function() { window.removeEventListener('hashchange', onHash); };
  }, []);

  var screen;
  switch (route) {
    case 'runs': screen = h(RunsScreen); break;
    case 'trace': screen = h(TraceScreen); break;
    case 'calendar': screen = h(CalendarScreen); break;
    case 'settings': screen = h(SettingsScreen); break;
    default: screen = h(DashboardScreen);
  }

  return h('div', { className: 'app-shell' },
    h(Sidebar, { current: route }),
    h('div', { className: 'main-area' },
      h(Topbar, { current: route }),
      h('main', { className: 'content', role: 'main' }, screen)
    )
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
