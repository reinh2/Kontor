server {
    listen 8080;
    server_name _;

    # Docker's embedded DNS keeps the backend service name current when its
    # container is recreated. A variable proxy target makes nginx resolve it
    # at request time instead of retaining the startup-time container IP.
    resolver 127.0.0.11 valid=5s ipv6=off;
    set $backend_upstream backend:8080;

    # Tenant provisioning can contain a full catalogue, staff roster, and
    # availability rules. Widget handlers enforce their own smaller body caps.
    client_max_body_size 128k;

    location / {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # The backend trusts the first XFF entry because nginx is the only
        # exposed proxy. Overwrite, rather than append, client-supplied XFF.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    location ~ ^/api/v1/.*/events$ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60m;
    }
}
