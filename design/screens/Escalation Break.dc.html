<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/kontor-docmind-design-system-4524202b-448a-4e76-aa63-307609316422/styles.css">
  <script src="_ds/kontor-docmind-design-system-4524202b-448a-4e76-aa63-307609316422/_ds_bundle.js"></script>
  <style>html,body{margin:0}*{box-sizing:border-box}</style>
</helmet>
<div style="display:flex;flex-direction:column;gap:14px;font-family:var(--font-sans)">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="flex:1;height:1px;background:var(--status-warning-border)"></div>
    <div style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:var(--status-warning-bg);border:1px solid var(--status-warning-border);border-radius:var(--radius-full);white-space:nowrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="color:var(--status-warning-fg)"><path d="M12 3l9 16H3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path><path d="M12 10v4M12 17h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
      <span style="font-size:var(--fs-micro);letter-spacing:var(--ls-caps);text-transform:uppercase;font-weight:var(--fw-medium);color:var(--status-warning-fg)">Handed to a human</span>
    </div>
    <div style="flex:1;height:1px;background:var(--status-warning-border)"></div>
  </div>
  <div style="text-align:center;font-size:var(--fs-caption);color:var(--text-tertiary);margin-top:-4px">{{ reason }}</div>
  <div style="display:flex;flex-direction:column;gap:6px;padding:12px;background:var(--surface-2);border:1px solid var(--border-default);border-radius:var(--radius-lg)">
    <div style="display:flex;align-items:center;gap:9px">
      <x-import component-from-global-scope="KontorKanonDesignSystem_452420.Avatar" name="{{ agentName }}" size="md" status="online" hint-size="32px,32px"></x-import>
      <div style="line-height:1.25">
        <div style="font-size:var(--fs-body-sm);font-weight:var(--fw-semibold)">{{ agentName }}</div>
        <div style="font-size:var(--fs-micro);color:var(--text-tertiary)">{{ agentRole }}</div>
      </div>
    </div>
    <div style="font-size:var(--fs-body-sm);line-height:var(--lh-normal);color:var(--text-primary);margin-top:2px">{{ message }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:220},&quot;reason&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;A team member is joining this conversation&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;agentName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Sofia Meyer&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;agentRole&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Salon Nord · front desk&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;message&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Hi Marta, I'm Sofia from the salon…&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      reason: this.props.reason ?? 'A team member is joining this conversation',
      agentName: this.props.agentName ?? 'Sofia Meyer',
      agentRole: this.props.agentRole ?? 'Salon Nord · front desk',
      message: this.props.message ?? 'Hi Marta, I\u2019m Sofia from the salon. I\u2019ll take it from here \u2014 happy to sort out a time that works for you.',
    };
  }
}
</script>
</body>
</html>
