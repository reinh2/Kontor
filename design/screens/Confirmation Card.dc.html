<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/kontor-docmind-design-system-4524202b-448a-4e76-aa63-307609316422/styles.css">
  <script src="_ds/kontor-docmind-design-system-4524202b-448a-4e76-aa63-307609316422/_ds_bundle.js"></script>
  <style>
    html,body{margin:0}*{box-sizing:border-box}
    @media (max-width:430px){ .cf-actions button{min-height:44px} }
  </style>
</helmet>
<div style="{{ cardStyle }}">
  <div style="display:flex;align-items:center;gap:8px;padding:9px 14px;background:color-mix(in srgb,var(--accent) 10%,var(--surface-1));border-bottom:1px solid var(--accent-border)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="color:var(--text-accent)"><path d="M13 2 4 14h7l-1 8 9-12h-7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path></svg>
    <span style="font-size:var(--fs-micro);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-accent);font-weight:var(--fw-medium)">Kontor will book this</span>
  </div>
  <div style="padding:14px">
    <div style="font-size:var(--fs-body);font-weight:var(--fw-semibold);letter-spacing:-.01em;margin-bottom:12px">Confirm your booking</div>
    <div style="display:flex;flex-direction:column;gap:9px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <span style="font-size:var(--fs-caption);color:var(--text-tertiary)">Service</span>
        <span style="font-size:var(--fs-body-sm);color:var(--text-primary)">{{ service }}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <span style="font-size:var(--fs-caption);color:var(--text-tertiary)">Stylist</span>
        <span style="display:flex;align-items:center;gap:7px;font-size:var(--fs-body-sm);color:var(--text-primary)">
          <x-import component-from-global-scope="KontorKanonDesignSystem_452420.Avatar" name="{{ staff }}" size="sm" hint-size="24px,24px"></x-import>
          {{ staff }}
        </span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <span style="font-size:var(--fs-caption);color:var(--text-tertiary)">Date &amp; time</span>
        <span style="font-family:var(--font-mono);font-size:var(--fs-body-sm);color:var(--text-primary)">{{ date }} · {{ time }}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <span style="font-size:var(--fs-caption);color:var(--text-tertiary)">Duration</span>
        <span style="font-family:var(--font-mono);font-size:var(--fs-body-sm);color:var(--text-primary)">{{ duration }}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding-top:9px;border-top:1px solid var(--border-subtle)">
        <span style="font-size:var(--fs-body-sm);color:var(--text-secondary)">Price</span>
        <span style="font-family:var(--font-mono);font-size:var(--fs-body);font-weight:var(--fw-semibold);color:var(--text-primary)">{{ price }}</span>
      </div>
    </div>
    <sc-if value="{{ confirmed }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;align-items:center;gap:7px;margin-top:13px;padding:9px 11px;background:var(--status-success-bg);border:1px solid var(--status-success-border);border-radius:var(--radius-md);font-size:var(--fs-caption);color:var(--status-success-fg)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 12.5 9 17.5 20 6.5" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        Confirmed — creating your booking…
      </div>
    </sc-if>
    <sc-if value="{{ pending }}" hint-placeholder-val="{{ true }}">
      <div class="cf-actions" style="display:flex;flex-direction:column;gap:8px;margin-top:14px">
        <x-import component-from-global-scope="KontorKanonDesignSystem_452420.Button" variant="primary" size="lg" full-width="{{ true }}" onClick="{{ onConfirm }}" hint-size="100%,42px">Confirm booking</x-import>
        <x-import component-from-global-scope="KontorKanonDesignSystem_452420.Button" variant="secondary" size="lg" full-width="{{ true }}" hint-size="100%,42px">Change something</x-import>
        <div style="text-align:center;font-size:var(--fs-micro);color:var(--text-tertiary);margin-top:2px">Nothing is booked until you confirm.</div>
      </div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:420},&quot;service&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Haircut&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;staff&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Alex Rivera&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;date&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Thu 16 Jul&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;time&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;18:30&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;duration&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;45 min&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;price&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;€38&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;confirmed&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  constructor(props) { super(props); this.state = { confirmed: !!props.confirmed }; }
  renderVals() {
    return {
      confirmed: this.state.confirmed,
      pending: !this.state.confirmed,
      onConfirm: () => this.setState({ confirmed: true }),
      service: this.props.service ?? 'Haircut',
      staff: this.props.staff ?? 'Alex Rivera',
      date: this.props.date ?? 'Thu 16 Jul',
      time: this.props.time ?? '18:30',
      duration: this.props.duration ?? '45 min',
      price: this.props.price ?? '\u20ac38',
      cardStyle: {
        border: '1px solid ' + (this.state.confirmed ? 'var(--status-success-border)' : 'var(--border-default)'),
        borderRadius: 'var(--radius-lg)', background: 'var(--surface-1)', overflow: 'hidden',
        fontFamily: 'var(--font-sans)', transition: 'var(--transition-colors)',
      },
    };
  }
}
</script>
</body>
</html>
