<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/kontor-docmind-design-system-4524202b-448a-4e76-aa63-307609316422/styles.css">
  <script src="_ds/kontor-docmind-design-system-4524202b-448a-4e76-aa63-307609316422/_ds_bundle.js"></script>
  <style>
    html,body{margin:0}*{box-sizing:border-box}
    .sp-slots{grid-template-columns:repeat(auto-fill,minmax(118px,1fr))}
    @media (max-width:430px){ .sp-slots{grid-template-columns:1fr !important} }
  </style>
</helmet>
<div style="border:1px solid var(--border-default);border-radius:var(--radius-lg);background:var(--surface-1);overflow:hidden;font-family:var(--font-sans)">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 13px;border-bottom:1px solid var(--border-subtle);background:color-mix(in srgb,var(--accent) 6%,var(--surface-1))">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="color:var(--text-accent)"><rect x="3" y="4.5" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="2"></rect><path d="M3 9h18M8 2.5v4M16 2.5v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
      <span style="font-size:var(--fs-body-sm);font-weight:var(--fw-semibold);letter-spacing:-.01em">Choose a time</span>
    </div>
    <div style="font-size:var(--fs-caption);color:var(--text-secondary)">{{ service }} · {{ duration }} · <span style="font-family:var(--font-mono);color:var(--text-primary)">{{ price }}</span></div>
  </div>
  <div style="padding:12px 13px;display:flex;flex-direction:column;gap:14px">
    <sc-for list="{{ days }}" as="day" hint-placeholder-count="2">
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="font-size:var(--fs-micro);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);font-weight:var(--fw-medium)">{{ day.label }}</div>
        <div class="sp-slots" style="display:grid;gap:8px">
          <sc-for list="{{ day.slots }}" as="slot" hint-placeholder-count="3">
            <button type="button" onClick="{{ slot.onClick }}" disabled="{{ slot.disabled }}" style="{{ slot.style }}">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;width:100%">
                <span style="font-family:var(--font-mono);font-size:var(--fs-body-sm);font-weight:var(--fw-medium)">{{ slot.time }}</span>
                <sc-if value="{{ slot.hasTag }}" hint-placeholder-val="{{ false }}"><span style="{{ slot.tagStyle }}">{{ slot.tag }}</span></sc-if>
              </div>
              <div style="display:flex;align-items:center;gap:6px;width:100%">
                <x-import component-from-global-scope="KontorKanonDesignSystem_452420.Avatar" name="{{ slot.staff }}" size="sm" hint-size="24px,24px"></x-import>
                <span style="font-size:var(--fs-caption);opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ slot.staff }}</span>
              </div>
            </button>
          </sc-for>
        </div>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:420},&quot;days&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{label:string;slots:{id:string;time:string;staff:string;state:'available'|'selected'|'unavailable'|'taken'}[]}[]&quot;},&quot;selectedId&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;18:30&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;service&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Haircut&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;duration&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;45 min&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;price&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;€38&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  constructor(props) { super(props); this.state = { selected: props.selectedId ?? '18:30' }; }
  defaultDays() {
    return [
      { label: 'Thursday 16 Jul', slots: [
        { id: '17:45', time: '17:45', staff: 'Alex Rivera', state: 'available' },
        { id: '18:30', time: '18:30', staff: 'Alex Rivera', state: 'available' },
        { id: '19:15', time: '19:15', staff: 'Alex Rivera', state: 'available' },
        { id: '17:00', time: '17:00', staff: 'Nadia P.', state: 'taken' },
        { id: '20:00', time: '20:00', staff: 'Tom B.', state: 'unavailable' },
      ] },
      { label: 'Friday 17 Jul', slots: [
        { id: 'f0930', time: '09:30', staff: 'Alex Rivera', state: 'available' },
        { id: 'f1115', time: '11:15', staff: 'Nadia P.', state: 'available' },
      ] },
    ];
  }
  styleFor(state, selected) {
    const base = { display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'flex-start', textAlign: 'left',
      padding: '10px 11px', minHeight: 58, borderRadius: 'var(--radius-md)', fontFamily: 'var(--font-sans)',
      transition: 'var(--transition-colors)' };
    if (selected) return { ...base, background: 'var(--accent)', border: '1px solid var(--accent)', color: 'var(--text-on-accent)', cursor: 'pointer' };
    if (state === 'available') return { ...base, background: 'var(--surface-2)', border: '1px solid var(--border-default)', color: 'var(--text-primary)', cursor: 'pointer' };
    if (state === 'taken') return { ...base, background: 'var(--surface-1)', border: '1px solid var(--border-subtle)', color: 'var(--text-tertiary)', cursor: 'not-allowed' };
    return { ...base, background: 'var(--surface-1)', border: '1px dashed var(--border-subtle)', color: 'var(--text-disabled)', cursor: 'not-allowed', opacity: 0.75 };
  }
  renderVals() {
    const days = (this.props.days ?? this.defaultDays()).map((day) => ({
      ...day,
      slots: day.slots.map((s) => {
        const selected = this.state.selected === s.id && s.state === 'available';
        const tag = selected ? 'Selected' : s.state === 'taken' ? 'Just taken' : s.state === 'unavailable' ? 'Full' : '';
        const tagColor = selected ? 'var(--text-on-accent)' : s.state === 'taken' ? 'var(--status-warning-fg)' : 'var(--text-tertiary)';
        return {
          ...s,
          disabled: s.state !== 'available',
          onClick: s.state === 'available' ? () => this.setState({ selected: s.id }) : undefined,
          style: this.styleFor(s.state, selected),
          hasTag: !!tag,
          tag,
          tagStyle: { fontSize: 'var(--fs-micro)', fontWeight: 'var(--fw-medium)', letterSpacing: 'var(--ls-wide)', color: tagColor },
        };
      }),
    }));
    return {
      days,
      service: this.props.service ?? 'Haircut',
      duration: this.props.duration ?? '45 min',
      price: this.props.price ?? '\u20ac38',
    };
  }
}
</script>
</body>
</html>
