name: kontor

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kontor
      POSTGRES_USER: kontor
      POSTGRES_PASSWORD: kontor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kontor -d kontor"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - kontor-postgres:/var/lib/postgresql/data

  backend:
    build:
      context: .
      args:
        TARGET: api
    environment:
      APP_ENV: demo
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://kontor:kontor@postgres:5432/kontor?sslmode=disable
      DEMO_MODE: "true"
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      SLOT_TOKEN_SECRET: ${SLOT_TOKEN_SECRET:-demo-only-change-me-32-bytes-minimum}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/kontor", "healthcheck", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12

  worker:
    build:
      context: .
      args:
        TARGET: worker
    environment:
      APP_ENV: demo
      DATABASE_URL: postgres://kontor:kontor@postgres:5432/kontor?sslmode=disable
      DEMO_MODE: "true"
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      SLOT_TOKEN_SECRET: ${SLOT_TOKEN_SECRET:-demo-only-change-me-32-bytes-minimum}
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  kontor-postgres:
