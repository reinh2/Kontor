name: kontor

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: kontor
      POSTGRES_USER: kontor
      POSTGRES_PASSWORD: kontor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kontor -d kontor"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - kontor-postgres:/var/lib/postgresql/data

  backend:
    build:
      context: .
      args:
        TARGET: api
    environment:
      APP_ENV: ${APP_ENV:-demo}
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://kontor:kontor@postgres:5432/kontor?sslmode=disable
      DEMO_MODE: ${DEMO_MODE:-true}
      FIXED_TENANT_ID: ${FIXED_TENANT_ID:-00000000-0000-4000-8000-000000000001}
      FIXED_TENANT_SLUG: ${FIXED_TENANT_SLUG:-salon-nord}
      FIXED_TENANT_NAME: ${FIXED_TENANT_NAME:-Salon Nord}
      FIXED_TENANT_TIMEZONE: ${FIXED_TENANT_TIMEZONE:-Europe/Berlin}
      FIXED_TENANT_CURRENCY: ${FIXED_TENANT_CURRENCY:-EUR}
      MULTI_TENANT: ${MULTI_TENANT:-true}
      TENANT_HOST_SUFFIX: ${TENANT_HOST_SUFFIX:-localhost}
      TENANT_CHANNEL_ENCRYPTION_KEY: ${TENANT_CHANNEL_ENCRYPTION_KEY:-demo-only-tenant-channel-key-32!}
      OPERATOR_SESSION_TTL: ${OPERATOR_SESSION_TTL:-12h}
      STAGE6_BOOTSTRAP_ENABLED: ${STAGE6_BOOTSTRAP_ENABLED:-}
      STAGE6_BOOTSTRAP_TENANT_ID: ${STAGE6_BOOTSTRAP_TENANT_ID:-}
      STAGE6_BOOTSTRAP_TENANT_SLUG: ${STAGE6_BOOTSTRAP_TENANT_SLUG:-}
      STAGE6_BOOTSTRAP_WIDGET_ORIGIN: ${STAGE6_BOOTSTRAP_WIDGET_ORIGIN:-}
      STAGE6_BOOTSTRAP_OWNER_EMAIL: ${STAGE6_BOOTSTRAP_OWNER_EMAIL:-}
      STAGE6_BOOTSTRAP_OWNER_DISPLAY_NAME: ${STAGE6_BOOTSTRAP_OWNER_DISPLAY_NAME:-}
      STAGE6_BOOTSTRAP_OWNER_PASSWORD: ${STAGE6_BOOTSTRAP_OWNER_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      DEMO_OWNER_EMAIL: ${DEMO_OWNER_EMAIL:-owner@salon-nord.test}
      DEMO_OWNER_PASSWORD: ${DEMO_OWNER_PASSWORD:-demo-operator-password}
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Kontor}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-8}
      AGENT_TURN_TIMEOUT: ${AGENT_TURN_TIMEOUT:-25s}
      AGENT_TOOL_TIMEOUT: ${AGENT_TOOL_TIMEOUT:-5s}
      AGENT_TOOL_MAX_ATTEMPTS: ${AGENT_TOOL_MAX_ATTEMPTS:-3}
      AGENT_CONVERSATION_TOKEN_BUDGET: ${AGENT_CONVERSATION_TOKEN_BUDGET:-50000}
      AGENT_MAX_OUTPUT_TOKENS: ${AGENT_MAX_OUTPUT_TOKENS:-800}
      SLOT_TOKEN_SECRET: ${SLOT_TOKEN_SECRET:-demo-only-change-me-32-bytes-minimum}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-35s}
      HTTP_ALLOWED_ORIGIN: ${HTTP_ALLOWED_ORIGIN:-*}
      HTTP_RATE_LIMIT_PER_MINUTE: ${HTTP_RATE_LIMIT_PER_MINUTE:-60}
      HTTP_RATE_LIMIT_BURST: ${HTTP_RATE_LIMIT_BURST:-20}
      HTTP_TRUST_FORWARDED_FOR: ${HTTP_TRUST_FORWARDED_FOR:-true}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/kontor", "healthcheck", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12

  worker:
    build:
      context: .
      args:
        TARGET: worker
    environment:
      APP_ENV: ${APP_ENV:-demo}
      DATABASE_URL: postgres://kontor:kontor@postgres:5432/kontor?sslmode=disable
      DEMO_MODE: ${DEMO_MODE:-true}
      FIXED_TENANT_ID: ${FIXED_TENANT_ID:-00000000-0000-4000-8000-000000000001}
      FIXED_TENANT_SLUG: ${FIXED_TENANT_SLUG:-salon-nord}
      FIXED_TENANT_NAME: ${FIXED_TENANT_NAME:-Salon Nord}
      FIXED_TENANT_TIMEZONE: ${FIXED_TENANT_TIMEZONE:-Europe/Berlin}
      FIXED_TENANT_CURRENCY: ${FIXED_TENANT_CURRENCY:-EUR}
      MULTI_TENANT: ${MULTI_TENANT:-true}
      TENANT_HOST_SUFFIX: ${TENANT_HOST_SUFFIX:-localhost}
      TENANT_CHANNEL_ENCRYPTION_KEY: ${TENANT_CHANNEL_ENCRYPTION_KEY:-demo-only-tenant-channel-key-32!}
      OPERATOR_SESSION_TTL: ${OPERATOR_SESSION_TTL:-12h}
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Kontor}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-8}
      AGENT_TURN_TIMEOUT: ${AGENT_TURN_TIMEOUT:-25s}
      AGENT_TOOL_TIMEOUT: ${AGENT_TOOL_TIMEOUT:-5s}
      AGENT_TOOL_MAX_ATTEMPTS: ${AGENT_TOOL_MAX_ATTEMPTS:-3}
      AGENT_CONVERSATION_TOKEN_BUDGET: ${AGENT_CONVERSATION_TOKEN_BUDGET:-50000}
      AGENT_MAX_OUTPUT_TOKENS: ${AGENT_MAX_OUTPUT_TOKENS:-800}
      SLOT_TOKEN_SECRET: ${SLOT_TOKEN_SECRET:-demo-only-change-me-32-bytes-minimum}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-35s}
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  kontor-postgres:
